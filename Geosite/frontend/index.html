<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoSite — 地図で読むニュース</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
:root{
  --bg:#080e1a;--card:rgba(8,14,26,0.96);--border:rgba(255,255,255,0.1);
  --text:#e8eaf0;--muted:rgba(255,255,255,0.42);--accent:#378ADD;
  --sb-width:300px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);}
.app{display:flex;flex-direction:column;height:100dvh;}

/* TOP BAR */
.top-bar{
  display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;
  padding:9px 14px;background:rgba(0,0,0,0.82);
  border-bottom:1px solid var(--border);z-index:1000;flex-shrink:0;
}
.logo{font-size:15px;font-weight:700;letter-spacing:0.12em;color:#fff;flex-shrink:0;padding-top:6px;}
.logo span{color:var(--accent);}
.controls{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;}
.mode-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.mode-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.2);flex-shrink:0;}
.mode-btn{font-size:11px;padding:5px 12px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);border:none;cursor:pointer;}
.mode-btn.on{background:var(--accent);color:#fff;font-weight:600;}
.count-row{display:flex;align-items:center;gap:8px;}
.count-label{font-size:10px;color:var(--muted);white-space:nowrap;}
input[type=range].count-slider{width:80px;accent-color:var(--accent);}
.count-val{font-size:11px;color:var(--text);min-width:24px;}
select.rss-select{
  font-size:12px;padding:6px 10px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);
  color:#fff;outline:none;cursor:pointer;
}
select.rss-select option{background:#0d1420;}
.ai-row{display:flex;gap:6px;align-items:center;}
.topic-input{
  flex:1;font-size:13px;padding:6px 11px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);
  color:#fff;outline:none;min-width:0;
}
.topic-input::placeholder{color:rgba(255,255,255,0.3);}
.btn-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.fetch-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600;flex-shrink:0;}
.fetch-btn:hover{background:#2a7ac8;}
.fetch-btn:disabled{opacity:0.4;cursor:not-allowed;}
.refresh-btn{font-size:11px;padding:5px 11px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;}
.refresh-btn:hover{background:rgba(255,255,255,0.08);color:#fff;}
.topic-chips{display:flex;gap:5px;flex-wrap:wrap;}
.t-chip{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);cursor:pointer;white-space:nowrap;transition:background .15s;}
.t-chip:hover{background:rgba(55,138,221,0.3);border-color:var(--accent);color:#fff;}
.t-chip.on{background:var(--accent);border-color:transparent;color:#fff;}
.status-pill{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;flex-shrink:0;padding-top:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;transition:background .3s;}
.dot.loading{background:#EF9F27;animation:blink 1s infinite;}
.dot.ok{background:#3B6D11;}
.dot.err{background:#E24B4A;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MAP */
.map-wrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}

/* MAP CONTROLS */
.map-ctrl-bar{
  position:absolute;top:10px;left:10px;z-index:500;
  display:flex;flex-direction:column;gap:6px;
}
.ctrl-group{display:flex;gap:4px;}
.ctrl-btn{
  font-size:11px;padding:5px 11px;border-radius:7px;
  border:1px solid rgba(255,255,255,0.22);
  background:rgba(8,14,26,0.85);color:rgba(255,255,255,0.72);
  cursor:pointer;backdrop-filter:blur(6px);white-space:nowrap;
}
.ctrl-btn.on{background:rgba(55,138,221,0.85);color:#fff;border-color:transparent;}
.ctrl-btn:hover:not(.on){background:rgba(255,255,255,0.12);}

/* SIDEBAR */
.sidebar{
  position:absolute;top:0;right:0;bottom:0;width:var(--sb-width);
  background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;z-index:500;
  transition:transform .3s ease;
  backdrop-filter:blur(12px);
}
.sb-head{padding:11px 13px 9px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sb-title{font-size:12px;font-weight:500;}
.badge{font-size:10px;background:rgba(55,138,221,0.2);color:var(--accent);padding:2px 8px;border-radius:10px;}
.sb-close-btn{display:none;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0;}
.filter-row{display:flex;gap:4px;padding:7px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.f-chip{font-size:10px;padding:2px 9px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--muted);cursor:pointer;}
.f-chip.on{color:#fff;border-color:transparent;font-weight:500;}
.card-scroll{flex:1;overflow-y:auto;padding:7px;}
.card-scroll::-webkit-scrollbar{width:3px;}
.card-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

/* NEWS CARD */
.news-card{padding:10px 11px;border-radius:10px;margin-bottom:6px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.025);cursor:pointer;transition:border-color .15s,background .15s;}
.news-card:hover,.news-card.active{border-color:rgba(55,138,221,0.4);background:rgba(55,138,221,0.06);}
.nc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px;}
.nc-tag{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.nc-save-btn{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;transition:all .15s;line-height:1.4;flex-shrink:0;}
.nc-save-btn:hover,.nc-save-btn.saved{background:rgba(55,138,221,0.25);border-color:var(--accent);color:var(--accent);}
.nc-title{font-size:11px;font-weight:500;line-height:1.45;margin-bottom:4px;color:var(--text);}
.nc-meta{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:4px;}
.nc-source{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(55,138,221,0.15);color:#378ADD;}
.nc-chips{display:flex;gap:3px;flex-wrap:wrap;}
.nc-chip{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:11px;text-align:center;padding:30px 16px;line-height:1.7;}

/* DETAIL DRAWER */
.drawer{
  position:absolute;bottom:0;left:0;right:var(--sb-width);
  background:var(--card);border-top:1px solid var(--border);
  padding:12px 15px 15px;display:none;z-index:600;max-height:45%;overflow-y:auto;
  backdrop-filter:blur(12px);
}
.drawer.show{display:block;}
.dd-close{float:right;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;margin-left:8px;}
.dd-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:4px;margin-bottom:6px;}
.dd-title{font-size:14px;font-weight:600;color:#fff;line-height:1.45;margin-bottom:8px;}
.dd-metas{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:8px;}
.dd-meta{font-size:10px;color:var(--muted);}
.dd-meta span{color:rgba(255,255,255,0.75);font-weight:500;}
.dd-body{font-size:12px;color:rgba(255,255,255,0.52);line-height:1.7;margin-bottom:9px;padding-top:9px;border-top:1px solid var(--border);}
.dd-link{font-size:11px;color:var(--accent);text-decoration:none;display:inline-block;margin-bottom:10px;}
.dd-link:hover{text-decoration:underline;}
.dd-rel-label{font-size:10px;color:var(--muted);margin-bottom:5px;}
.dd-rel-row{display:flex;gap:5px;flex-wrap:wrap;}
.dd-rel-chip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);cursor:pointer;}
.dd-rel-chip:hover{border-color:var(--accent);color:var(--accent);}

/* TIMELINE */
.tl-ctrl{
  position:absolute;bottom:0;left:0;right:var(--sb-width);
  padding:7px 15px 9px;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
  z-index:400;pointer-events:none;
}
.tl-ctrl *{pointer-events:all;}
.tl-labels{display:flex;justify-content:space-between;font-size:9px;color:rgba(255,255,255,0.38);margin-bottom:3px;}
.tl-slider{width:100%;accent-color:var(--accent);}
.tl-year{text-align:center;font-size:11px;color:rgba(255,255,255,0.62);margin-top:2px;}

/* MOBILE */
.sb-toggle-btn{display:none;position:absolute;bottom:56px;right:12px;z-index:600;width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.4);align-items:center;justify-content:center;}
.sb-toggle-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;}
.overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:490;}
.overlay.show{display:block;}

/* Mapbox overrides */
.mapboxgl-ctrl-bottom-left,.mapboxgl-ctrl-bottom-right{z-index:200;}
.mapboxgl-popup-content{background:#fff;border-radius:10px;padding:11px 13px;min-width:190px;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.mapboxgl-popup-tip{border-top-color:#fff!important;border-bottom-color:#fff!important;}
.pu-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;border-radius:4px;margin-bottom:4px;}
.pu-title{font-size:12px;font-weight:600;color:#111;line-height:1.4;margin-bottom:4px;}
.pu-loc{font-size:10px;color:#888;}
.pu-btn{font-size:10px;color:#185FA5;background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:5px;padding:0;display:block;}

@media(max-width:680px){
  :root{--sb-width:0px;}
  .top-bar{padding:8px 12px;}
  .status-pill{flex-basis:100%;padding-top:2px;}
  .sidebar{position:absolute;bottom:0;left:0;right:0;top:auto;width:100%;max-height:70dvh;border-left:none;border-top:1px solid var(--border);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s ease;z-index:600;}
  .sidebar.open{transform:translateY(0);}
  .sb-close-btn{display:block;}
  .sb-toggle-btn{display:flex;}
  .overlay.show{display:block;}
  .drawer{right:0;max-height:55dvh;}
  .tl-ctrl{right:0;}
  .map-ctrl-bar{top:auto;bottom:56px;left:10px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="logo">Geo<span>Site</span></span>
    <div class="controls">
      <div class="mode-row">
        <div class="mode-toggle">
          <button class="mode-btn on" id="modeAI"  onclick="setMode('ai')">AI生成</button>
          <button class="mode-btn"    id="modeRSS" onclick="setMode('rss')">実ニュース</button>
        </div>
        <div class="count-row" id="countRow">
          <span class="count-label">件数</span>
          <input type="range" class="count-slider" id="countSlider" min="5" max="30" step="5" value="20"
            oninput="document.getElementById('countVal').textContent=this.value">
          <span class="count-val" id="countVal">20</span>
        </div>
        <select class="rss-select" id="rssSource" style="display:none">
          <option value="nhk">NHK World</option>
          <option value="bbc">BBC News</option>
          <option value="reuters">Reuters</option>
        </select>
      </div>
      <div class="ai-row" id="aiRow">
        <input class="topic-input" id="topicInput" placeholder="トピックを入力..." value="世界の最新ニュース">
      </div>
      <div class="btn-row">
        <button class="fetch-btn" id="fetchBtn" onclick="loadNews(false)">取得</button>
        <button class="refresh-btn" onclick="loadNews(true)">再取得</button>
      </div>
      <div class="topic-chips" id="topicChips"></div>
    </div>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="statusText">待機中</span>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-wrap">
    <div id="map"></div>

    <!-- MAP CONTROLS -->
    <div class="map-ctrl-bar">
      <!-- 表示スタイル -->
      <div class="ctrl-group">
        <button class="ctrl-btn on" id="btnSatellite" onclick="setStyle('satellite')">衛星</button>
        <button class="ctrl-btn" id="btnStreet"    onclick="setStyle('street')">標準</button>
        <button class="ctrl-btn" id="btnDark"      onclick="setStyle('dark')">ダーク</button>
      </div>
      <!-- 投影モード -->
      <div class="ctrl-group">
        <button class="ctrl-btn on" id="btnMap"   onclick="setProjection('mercator')">地図</button>
        <button class="ctrl-btn" id="btnGlobe"    onclick="setProjection('globe')">地球儀</button>
      </div>
      <!-- 3D機能 -->
      <div class="ctrl-group">
        <button class="ctrl-btn on" id="btn3dTerrain"  onclick="toggle3D('terrain')">地形3D</button>
        <button class="ctrl-btn on" id="btn3dBuilding" onclick="toggle3D('building')">建物3D</button>
      </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sb-head">
        <span class="sb-title">ニュース</span>
        <span class="badge" id="badge">0件</span>
        <button class="sb-close-btn" onclick="closeSidebar()">✕</button>
      </div>
      <div class="filter-row">
        <button class="f-chip on" onclick="setFilter(this,'all')">すべて</button>
        <button class="f-chip" onclick="setFilter(this,'紛争')">紛争</button>
        <button class="f-chip" onclick="setFilter(this,'技術')">技術</button>
        <button class="f-chip" onclick="setFilter(this,'環境')">環境</button>
        <button class="f-chip" onclick="setFilter(this,'経済')">経済</button>
        <button class="f-chip" onclick="setFilter(this,'社会')">社会</button>
        <button class="f-chip" onclick="setFilter(this,'災害')">災害</button>
        <button class="f-chip" onclick="setFilter(this,'宇宙')">宇宙</button>
        <button class="f-chip" onclick="setFilter(this,'科学')">科学</button>
      </div>
      <div class="card-scroll" id="cardScroll">
        <div class="empty-state">トピックを入力して「取得」を押してください</div>
      </div>
    </div>

    <button class="sb-toggle-btn" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- DETAIL DRAWER -->
    <div class="drawer" id="drawer">
      <span class="dd-close" onclick="closeDrawer()">✕</span>
      <span class="dd-tag" id="ddTag"></span>
      <div class="dd-title" id="ddTitle"></div>
      <div class="dd-metas">
        <div class="dd-meta">場所 <span id="ddLoc"></span></div>
        <div class="dd-meta">日時 <span id="ddDate"></span></div>
        <div class="dd-meta">カテゴリ <span id="ddCat"></span></div>
      </div>
      <div class="dd-body" id="ddBody"></div>
      <a class="dd-link" id="ddLink" href="#" target="_blank" rel="noopener" style="display:none">記事を読む →</a>
      <div class="dd-rel-label">関連項目</div>
      <div class="dd-rel-row" id="ddRel"></div>
    </div>

    <!-- TIMELINE -->
    <div class="tl-ctrl">
      <div class="tl-labels"><span>2020年</span><span>2022</span><span>2024</span><span>2025年</span></div>
      <input type="range" class="tl-slider" id="tl" min="2020" max="2025" value="2025" step="1">
      <div class="tl-year" id="tlYear">2025年</div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
mapboxgl.accessToken = 'pk.eyJ1IjoiZnNob3NoaSIsImEiOiJjbW5lZXM1eXUxZ29rMnBxd3owZHJ5aWtrIn0.KB8sAvJ-fT7CmrZry4NI_Q';

const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:3001'
  : 'https://akashic-library-production.up.railway.app';

const TOPICS = [
  '世界の最新ニュース','気候変動','AI・テクノロジー','中東情勢',
  '宇宙開発','経済・金融','自然災害','日本のニュース','宇宙・科学'
];

const CAT_COLORS = {
  '紛争':'#E24B4A','技術':'#378ADD','環境':'#639922','経済':'#EF9F27',
  '社会':'#7F77DD','文化':'#D85A30','科学':'#1D9E75','災害':'#D85A30',
  '宇宙':'#534AB7','スポーツ':'#0F6E56','その他':'#888780'
};

const STYLES = {
  satellite: 'mapbox://styles/mapbox/satellite-streets-v12',
  street:    'mapbox://styles/mapbox/streets-v12',
  dark:      'mapbox://styles/mapbox/dark-v11'
};

// ── MAP INIT ──────────────────────────────────────────────
const map = new mapboxgl.Map({
  container: 'map',
  style: STYLES.satellite,
  center: [10, 20],
  zoom: 2,
  pitch: 0,
  bearing: 0,
  projection: 'mercator',
  antialias: true,
  fadeDuration: 0
});

map.addControl(new mapboxgl.NavigationControl({ showCompass: true }), 'bottom-left');
map.addControl(new mapboxgl.ScaleControl({ unit: 'metric' }), 'bottom-right');

// ── STATE ─────────────────────────────────────────────────
let allNews = [], markers = [], curFilter = 'all', curMode = 'ai';
let curStyle = 'satellite', curProjection = 'mercator';
let terrain3D = true, building3D = true;
let mapLoaded = false;
const saved = new Set(JSON.parse(localStorage.getItem('geosite_saved') || '[]'));
const popups = [];

// ── MAP LOAD ──────────────────────────────────────────────
map.on('load', () => {
  mapLoaded = true;

  // v3ではGlobeがデフォルトになるため明示的にmercatorを強制
  map.setProjection('mercator');
  curProjection = 'mercator';
  document.getElementById('btnMap').classList.add('on');
  document.getElementById('btnGlobe').classList.remove('on');

  // 地図モード初期: fogなし（地球表面を隠さない）
  map.setFog({});


  // Skyレイヤー（大気・太陽光）
  map.addLayer({
    id: 'sky',
    type: 'sky',
    paint: {
      'sky-type': 'atmosphere',
      'sky-atmosphere-sun': [0.0, 90.0],
      'sky-atmosphere-sun-intensity': 15
    }
  });

  // 3D地形
  map.addSource('mapbox-dem', {
    type: 'raster-dem',
    url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
    tileSize: 512,
    maxzoom: 14
  });
  map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });

  // 3D建物
  add3DBuildings();

  // ピン再描画（ニュース取得済みの場合）
  refreshMarkers();
});

// スタイル変更後に3D要素を再適用
map.on('style.load', () => {
  if (!mapLoaded) return;

  if (curProjection === 'globe') {
    map.setFog({
      color: 'rgb(186, 210, 235)',
      'high-color': 'rgb(36, 92, 223)',
      'horizon-blend': 0.04,
      'space-color': 'rgb(5, 5, 25)',
      'star-intensity': 0.6
    });
  } else {
    map.setFog({});
  }

  if (!map.getLayer('sky')) {
    map.addLayer({
      id: 'sky',
      type: 'sky',
      paint: {
        'sky-type': 'atmosphere',
        'sky-atmosphere-sun': [0.0, 90.0],
        'sky-atmosphere-sun-intensity': 15
      }
    });
  }

  if (!map.getSource('mapbox-dem')) {
    map.addSource('mapbox-dem', {
      type: 'raster-dem',
      url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
      tileSize: 512,
      maxzoom: 14
    });
  }
  if (terrain3D) map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });
  if (building3D) add3DBuildings();
  refreshMarkers();
});

// ── 3D 建物レイヤー ───────────────────────────────────────
function add3DBuildings() {
  if (map.getLayer('3d-buildings')) return;
  const layers = map.getStyle().layers;
  let labelLayerId;
  for (const layer of layers) {
    if (layer.type === 'symbol' && layer.layout['text-field']) {
      labelLayerId = layer.id;
      break;
    }
  }
  map.addLayer({
    id: '3d-buildings',
    source: 'composite',
    'source-layer': 'building',
    filter: ['==', 'extrude', 'true'],
    type: 'fill-extrusion',
    minzoom: 12,
    paint: {
      'fill-extrusion-color': [
        'interpolate', ['linear'], ['get', 'height'],
        0,   '#1a2a3a',
        50,  '#223344',
        200, '#2a4a5a'
      ],
      'fill-extrusion-height': ['get', 'height'],
      'fill-extrusion-base':   ['get', 'min_height'],
      'fill-extrusion-opacity': 0.75
    }
  }, labelLayerId);
}

// ── MAP CONTROL FUNCTIONS ─────────────────────────────────
function setStyle(name) {
  if (curStyle === name) return;
  curStyle = name;
  document.querySelectorAll('.ctrl-btn[id^="btn"]').forEach(b => {
    if (['btnSatellite','btnStreet','btnDark'].includes(b.id)) b.classList.remove('on');
  });
  document.getElementById('btn' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('on');
  clearMarkers();
  map.setStyle(STYLES[name]);
}

function setProjection(proj) {
  curProjection = proj;
  document.getElementById('btnMap').classList.toggle('on',   proj === 'mercator');
  document.getElementById('btnGlobe').classList.toggle('on', proj === 'globe');

  if (proj === 'globe') {
    map.setProjection('globe');
    map.setFog({
      color: 'rgb(186, 210, 235)',
      'high-color': 'rgb(36, 92, 223)',
      'horizon-blend': 0.04,
      'space-color': 'rgb(5, 5, 25)',
      'star-intensity': 0.6
    });
    map.easeTo({ pitch: 0, bearing: 0, zoom: 1.5, duration: 800 });
  } else {
    // mercator: スタイルを再セットして確実に2D地図に戻す
    map.setFog({});
    map.setProjection('mercator');
    // v3でGlobeが残る場合はスタイル再ロードで強制リセット
    const currentStyle = STYLES[curStyle];
    clearMarkers();
    map.setStyle(currentStyle);
    map.easeTo({ zoom: 2, pitch: 0, bearing: 0, duration: 600 });
  }
}

function toggle3D(type) {
  if (type === 'terrain') {
    terrain3D = !terrain3D;
    document.getElementById('btn3dTerrain').classList.toggle('on', terrain3D);
    if (terrain3D) {
      map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });
    } else {
      map.setTerrain(null);
    }
  } else {
    building3D = !building3D;
    document.getElementById('btn3dBuilding').classList.toggle('on', building3D);
    if (building3D) {
      add3DBuildings();
    } else {
      if (map.getLayer('3d-buildings')) map.removeLayer('3d-buildings');
    }
  }
}

// ── MARKERS ───────────────────────────────────────────────
function clearMarkers() {
  markers.forEach(m => m.remove());
  markers = [];
  popups.forEach(p => p.remove());
  popups.length = 0;
}

function addMarker(n) {
  // 緯度経度の異常値をスキップ
  if (!n.lat || !n.lng || isNaN(n.lat) || isNaN(n.lng) ||
      n.lat < -90 || n.lat > 90 || n.lng < -180 || n.lng > 180) return;

  const color = CAT_COLORS[n.category] || CAT_COLORS['その他'];

  const el = document.createElement('div');
  el.style.cssText = `position:relative;width:24px;height:24px;cursor:pointer;`;
  el.innerHTML = `
    <div style="position:absolute;inset:0;border-radius:50%;background:${color};opacity:0.22;"></div>
    <div style="position:absolute;inset:5px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.9);box-shadow:0 0 8px ${color}88;"></div>`;

  const popup = new mapboxgl.Popup({ offset: 14, closeButton: false, maxWidth: '240px' })
    .setHTML(`
      <span class="pu-tag" style="background:${color}22;color:${color}">${n.category}</span>
      <div class="pu-title">${n.title}</div>
      <div class="pu-loc">📍 ${n.location} · ${n.date || ''}</div>
      <button class="pu-btn" onclick="openById('${n.id}')">詳細を見る</button>`);

  const marker = new mapboxgl.Marker(el)
    .setLngLat([n.lng, n.lat])
    .setPopup(popup)
    .addTo(map);

  el.addEventListener('click', () => openById(n.id));
  markers.push(marker);
  popups.push(popup);
}

function refreshMarkers() {
  clearMarkers();
  if (!mapLoaded) return;
  const yr = parseInt(document.getElementById('tl').value);
  allNews
    .filter(n => (curFilter === 'all' || n.category === curFilter) && (n.year || 2025) <= yr)
    .forEach(addMarker);
}

// ── DRAWER ────────────────────────────────────────────────
function openById(id) {
  const n = allNews.find(x => x.id === id); if (!n) return;
  const color = CAT_COLORS[n.category] || CAT_COLORS['その他'];

  document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.news-card[data-id="${id}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }

  const tag = document.getElementById('ddTag');
  tag.textContent = n.category;
  tag.style.cssText = `display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:4px;margin-bottom:6px;background:${color}22;color:${color};`;
  document.getElementById('ddTitle').textContent = n.title;
  document.getElementById('ddLoc').textContent   = n.location;
  document.getElementById('ddDate').textContent  = n.date || (n.year || '') + '年';
  document.getElementById('ddCat').textContent   = n.category;
  document.getElementById('ddBody').textContent  = n.summary || '';

  const lnk = document.getElementById('ddLink');
  if (n.link) { lnk.href = n.link; lnk.style.display = 'inline'; }
  else lnk.style.display = 'none';

  const rel = document.getElementById('ddRel'); rel.innerHTML = '';
  (n.related || []).forEach(r => {
    const s = document.createElement('span');
    s.className = 'dd-rel-chip'; s.textContent = r;
    s.onclick = () => {
      setMode('ai');
      document.getElementById('topicInput').value = r;
      document.querySelectorAll('.t-chip').forEach(b => b.classList.remove('on'));
      loadNews(false);
    };
    rel.appendChild(s);
  });

  document.getElementById('drawer').classList.add('show');

  // カメラをニュース地点へ移動（3D視点付き）
  map.easeTo({
    center: [n.lng, n.lat],
    zoom: Math.max(map.getZoom(), 4),
    pitch: curProjection === 'globe' ? 0 : 45,
    bearing: 10,
    duration: 1000
  });

  if (window.innerWidth <= 680) closeSidebar();
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('show');
  document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
}

// ── SAVE ──────────────────────────────────────────────────
function toggleSave(id, btn) {
  if (saved.has(id)) {
    saved.delete(id); btn.textContent = '保存'; btn.classList.remove('saved');
  } else {
    saved.add(id); btn.textContent = '済'; btn.classList.add('saved');
  }
  localStorage.setItem('geosite_saved', JSON.stringify([...saved]));
}

// ── FILTER / TIMELINE ─────────────────────────────────────
function setFilter(btn, cat) {
  curFilter = cat;
  document.querySelectorAll('.f-chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCards(); refreshMarkers(); closeDrawer();
}

document.getElementById('tl').addEventListener('input', function() {
  document.getElementById('tlYear').textContent = this.value + '年';
  renderCards(); refreshMarkers();
});

// ── MODE ──────────────────────────────────────────────────
function setMode(mode) {
  curMode = mode;
  document.getElementById('modeAI').classList.toggle('on',  mode === 'ai');
  document.getElementById('modeRSS').classList.toggle('on', mode === 'rss');
  document.getElementById('aiRow').style.display      = mode === 'ai'  ? 'flex'  : 'none';
  document.getElementById('countRow').style.display   = mode === 'ai'  ? 'flex'  : 'none';
  document.getElementById('topicChips').style.display = mode === 'ai'  ? 'flex'  : 'none';
  document.getElementById('rssSource').style.display  = mode === 'rss' ? 'block' : 'none';
}

// ── TOPIC CHIPS ───────────────────────────────────────────
function initTopicChips() {
  const wrap = document.getElementById('topicChips');
  TOPICS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 't-chip'; btn.textContent = t;
    btn.onclick = () => {
      document.querySelectorAll('.t-chip').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById('topicInput').value = t;
      loadNews(false);
    };
    wrap.appendChild(btn);
  });
}

// ── STATUS ────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('dot').className = 'dot' + (state ? ' ' + state : '');
  document.getElementById('statusText').textContent = text;
}

// ── SIDEBAR MOBILE ────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── RENDER CARDS ──────────────────────────────────────────
function renderCards() {
  const yr = parseInt(document.getElementById('tl').value);
  const list = allNews.filter(n =>
    (curFilter === 'all' || n.category === curFilter) && (n.year || 2025) <= yr
  );
  const scroll = document.getElementById('cardScroll');
  if (!list.length) {
    scroll.innerHTML = `<div class="empty-state">該当するニュースがありません</div>`;
    return;
  }
  scroll.innerHTML = list.map(n => {
    const color = CAT_COLORS[n.category] || CAT_COLORS['その他'];
    const isSaved = saved.has(n.id);
    const sourceLabel = n.link ? '<span class="nc-source">RSS</span>' : '';
    return `<div class="news-card" data-id="${n.id}" onclick="openById('${n.id}')">
      <div class="nc-header">
        <span class="nc-tag" style="background:${color}1a;color:${color}">${n.category}</span>
        <button class="nc-save-btn${isSaved ? ' saved' : ''}"
          onclick="event.stopPropagation();toggleSave('${n.id}',this)">${isSaved ? '済' : '保存'}</button>
      </div>
      <div class="nc-title">${n.title}</div>
      <div class="nc-meta">${sourceLabel}📍 ${n.location} · ${n.date || n.year || ''}</div>
      <div class="nc-chips">${(n.related || []).slice(0, 3).map(r => `<span class="nc-chip">${r}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

// ── LOAD NEWS ─────────────────────────────────────────────
async function loadNews(force = false) {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true; closeDrawer();
  setStatus('loading', '取得中...');
  try {
    let url;
    if (curMode === 'rss') {
      const source = document.getElementById('rssSource').value;
      url = `${API_BASE}/api/news?mode=rss&source=${source}${force ? '&force=1' : ''}`;
      setStatus('loading', `${source.toUpperCase()} RSS取得中...`);
    } else {
      const topic = document.getElementById('topicInput').value.trim() || '世界の最新ニュース';
      const count = document.getElementById('countSlider').value;
      url = `${API_BASE}/api/news?mode=ai&topic=${encodeURIComponent(topic)}&count=${count}${force ? '&force=1' : ''}`;
    }
    const res = await fetch(url);
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'サーバーエラー'); }
    const { news, source, age_min } = await res.json();
    allNews = news.map((n, i) => ({ ...n, id: 'n' + i }));
    document.getElementById('badge').textContent = allNews.length + '件';
    renderCards(); refreshMarkers();

    // マーカー全体が見えるようカメラをフィット
    if (allNews.length) {
      const valid = allNews.filter(n =>
        n.lat >= -90 && n.lat <= 90 && n.lng >= -180 && n.lng <= 180
      );
      if (valid.length) {
        const lngs = valid.map(n => n.lng), lats = valid.map(n => n.lat);
        map.fitBounds(
          [[Math.min(...lngs) - 5, Math.min(...lats) - 5], [Math.max(...lngs) + 5, Math.max(...lats) + 5]],
          { padding: 40, pitch: 20, duration: 1200 }
        );
      }
    }
    const note = source === 'cache' ? `（キャッシュ ${age_min}分前）` : '';
    setStatus('ok', `${allNews.length}件 ${note}`);
  } catch (e) {
    setStatus('err', e.message);
    document.getElementById('cardScroll').innerHTML =
      `<div class="empty-state" style="color:rgba(226,75,74,0.8)">${e.message}</div>`;
  }
  btn.disabled = false;
}

// ── INIT ──────────────────────────────────────────────────
initTopicChips();
</script>
