<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoSite — 地図で読むニュース</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#080e1a;--card:rgba(8,14,26,0.96);--border:rgba(255,255,255,0.1);
  --text:#e8eaf0;--muted:rgba(255,255,255,0.42);--accent:#378ADD;
  --sb-width:300px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100dvh;}

/* ── TOP BAR ── */
.top-bar{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;background:rgba(0,0,0,0.82);
  border-bottom:1px solid var(--border);z-index:1000;flex-shrink:0;
}
.logo{font-size:15px;font-weight:700;letter-spacing:0.12em;color:#fff;flex-shrink:0;}
.logo span{color:var(--accent);}
.search-wrap{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0;}
.topic-row{display:flex;gap:6px;}
.topic-input{
  flex:1;font-size:13px;padding:7px 12px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);
  color:#fff;outline:none;min-width:0;
}
.topic-input::placeholder{color:rgba(255,255,255,0.3);}
.fetch-btn{
  font-size:12px;padding:7px 16px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;cursor:pointer;font-weight:600;flex-shrink:0;
}
.fetch-btn:hover{background:#2a7ac8;}
.fetch-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* トピック候補ボタン */
.topic-chips{display:flex;gap:5px;flex-wrap:wrap;}
.t-chip{
  font-size:10px;padding:3px 10px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.7);cursor:pointer;white-space:nowrap;
  transition:background .15s,border-color .15s;
}
.t-chip:hover{background:rgba(55,138,221,0.3);border-color:var(--accent);color:#fff;}
.t-chip.on{background:var(--accent);border-color:transparent;color:#fff;}

.status-pill{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;transition:background .3s;}
.dot.loading{background:#EF9F27;animation:blink 1s infinite;}
.dot.ok{background:#3B6D11;}
.dot.err{background:#E24B4A;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAP WRAP ── */
.map-wrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
.leaflet-tile{filter:brightness(.82) saturate(.7);}

/* ── LAYER TOGGLE ── */
.layer-ctrl{position:absolute;top:10px;left:10px;z-index:500;display:flex;gap:4px;}
.layer-btn{
  font-size:11px;padding:5px 11px;border-radius:7px;
  border:1px solid rgba(255,255,255,0.22);
  background:rgba(8,14,26,0.85);color:rgba(255,255,255,0.72);cursor:pointer;
}
.layer-btn.on{background:rgba(55,138,221,0.85);color:#fff;border-color:transparent;}

/* ── SIDEBAR（デスクトップ）── */
.sidebar{
  position:absolute;top:0;right:0;bottom:0;width:var(--sb-width);
  background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;z-index:500;
  transition:transform .3s ease;
}
.sb-head{
  padding:11px 13px 9px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.sb-title{font-size:12px;font-weight:500;}
.badge{font-size:10px;background:rgba(55,138,221,0.2);color:var(--accent);padding:2px 8px;border-radius:10px;}
.sb-close-btn{display:none;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0;}
.filter-row{display:flex;gap:4px;padding:7px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.f-chip{
  font-size:10px;padding:2px 9px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.15);background:transparent;
  color:var(--muted);cursor:pointer;
}
.f-chip.on{color:#fff;border-color:transparent;font-weight:500;}
.card-scroll{flex:1;overflow-y:auto;padding:7px;}
.card-scroll::-webkit-scrollbar{width:3px;}
.card-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

/* ── NEWS CARD ── */
.news-card{
  padding:10px 11px;border-radius:10px;margin-bottom:6px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.025);cursor:pointer;
  transition:border-color .15s,background .15s;
}
.news-card:hover,.news-card.active{
  border-color:rgba(55,138,221,0.4);background:rgba(55,138,221,0.06);
}
.nc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px;}
.nc-tag{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.nc-actions{display:flex;gap:4px;margin-left:auto;}
.nc-save-btn{
  font-size:10px;padding:2px 7px;border-radius:4px;
  border:1px solid rgba(255,255,255,0.15);background:transparent;
  color:rgba(255,255,255,0.4);cursor:pointer;transition:all .15s;line-height:1.4;
}
.nc-save-btn:hover,.nc-save-btn.saved{
  background:rgba(55,138,221,0.25);border-color:var(--accent);color:var(--accent);
}
.nc-save-btn.saved{background:rgba(55,138,221,0.2);}
.nc-title{font-size:11px;font-weight:500;line-height:1.45;margin-bottom:4px;color:var(--text);}
.nc-meta{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-bottom:4px;}
.nc-chips{display:flex;gap:3px;flex-wrap:wrap;}
.nc-chip{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--muted);font-size:11px;text-align:center;padding:30px 16px;line-height:1.7;
}

/* ── DETAIL DRAWER ── */
.drawer{
  position:absolute;bottom:0;left:0;right:var(--sb-width);
  background:var(--card);border-top:1px solid var(--border);
  padding:12px 15px 15px;display:none;z-index:600;
  max-height:45%;overflow-y:auto;
}
.drawer.show{display:block;}
.dd-close{float:right;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;margin-left:8px;}
.dd-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:4px;margin-bottom:6px;}
.dd-title{font-size:14px;font-weight:600;color:#fff;line-height:1.45;margin-bottom:8px;}
.dd-metas{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:8px;}
.dd-meta{font-size:10px;color:var(--muted);}
.dd-meta span{color:rgba(255,255,255,0.75);font-weight:500;}
.dd-body{font-size:12px;color:rgba(255,255,255,0.52);line-height:1.7;margin-bottom:9px;padding-top:9px;border-top:1px solid var(--border);}
.dd-rel-label{font-size:10px;color:var(--muted);margin-bottom:5px;}
.dd-rel-row{display:flex;gap:5px;flex-wrap:wrap;}
.dd-rel-chip{
  font-size:11px;padding:3px 10px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);cursor:pointer;
}
.dd-rel-chip:hover{border-color:var(--accent);color:var(--accent);}

/* ── TIMELINE ── */
.tl-ctrl{
  position:absolute;bottom:0;left:0;right:var(--sb-width);
  padding:7px 15px 9px;
  background:linear-gradient(to top,rgba(0,0,0,0.65),transparent);
  z-index:400;pointer-events:none;
}
.tl-ctrl *{pointer-events:all;}
.tl-labels{display:flex;justify-content:space-between;font-size:9px;color:rgba(255,255,255,0.38);margin-bottom:3px;}
.tl-slider{width:100%;accent-color:var(--accent);}
.tl-year{text-align:center;font-size:11px;color:rgba(255,255,255,0.62);margin-top:2px;}

/* ── MOBILE BOTTOM SHEET ── */
.sb-toggle-btn{
  display:none;position:absolute;bottom:56px;right:12px;z-index:600;
  width:44px;height:44px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);
  align-items:center;justify-content:center;
}
.sb-toggle-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;}
.overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:490;}
.overlay.show{display:block;}

/* ── POPUP ── */
.leaflet-popup-content-wrapper{background:#fff;border-radius:10px;padding:0;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.leaflet-popup-content{margin:11px 13px;min-width:190px;}
.leaflet-popup-tip{background:#fff;}
.pu-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;border-radius:4px;margin-bottom:4px;}
.pu-title{font-size:12px;font-weight:600;color:#111;line-height:1.4;margin-bottom:4px;}
.pu-loc{font-size:10px;color:#888;}
.pu-btn{font-size:10px;color:#185FA5;background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:5px;padding:0;display:block;}

/* ── MOBILE OVERRIDES ── */
@media(max-width:680px){
  :root{--sb-width:0px;}
  .top-bar{flex-wrap:wrap;padding:8px 12px;}
  .search-wrap{order:2;flex-basis:100%;}
  .status-pill{order:3;flex-basis:100%;}

  .sidebar{
    position:absolute;bottom:0;left:0;right:0;top:auto;
    width:100%;max-height:70dvh;
    border-left:none;border-top:1px solid var(--border);
    border-radius:16px 16px 0 0;
    transform:translateY(100%);
    transition:transform .3s ease;
    z-index:600;
  }
  .sidebar.open{transform:translateY(0);}
  .sb-close-btn{display:block;}
  .sb-toggle-btn{display:flex;}
  .overlay.show{display:block;}

  .drawer{right:0;max-height:55dvh;}
  .tl-ctrl{right:0;}
  .layer-ctrl{top:auto;bottom:56px;left:12px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="logo">Geo<span>Site</span></span>
    <div class="search-wrap">
      <div class="topic-row">
        <input class="topic-input" id="topicInput" placeholder="トピックを入力..." value="世界の最新ニュース">
        <button class="fetch-btn" id="fetchBtn" onclick="loadNews()">取得</button>
      </div>
      <div class="topic-chips" id="topicChips"></div>
    </div>
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="statusText">待機中</span>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-wrap">
    <div id="map"></div>

    <div class="layer-ctrl">
      <button class="layer-btn on" id="btnStreet"    onclick="setLayer('street')">標準</button>
      <button class="layer-btn"    id="btnSatellite" onclick="setLayer('satellite')">衛星</button>
      <button class="layer-btn"    id="btnDark"      onclick="setLayer('dark')">ダーク</button>
    </div>

    <!-- オーバーレイ（モバイル用） -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sb-head">
        <span class="sb-title">ニュース</span>
        <span class="badge" id="badge">0件</span>
        <button class="sb-close-btn" onclick="closeSidebar()">✕</button>
      </div>
      <div class="filter-row">
        <button class="f-chip on" onclick="setFilter(this,'all')">すべて</button>
        <button class="f-chip" onclick="setFilter(this,'紛争')">紛争</button>
        <button class="f-chip" onclick="setFilter(this,'技術')">技術</button>
        <button class="f-chip" onclick="setFilter(this,'環境')">環境</button>
        <button class="f-chip" onclick="setFilter(this,'経済')">経済</button>
        <button class="f-chip" onclick="setFilter(this,'社会')">社会</button>
      </div>
      <div class="card-scroll" id="cardScroll">
        <div class="empty-state">トピックを入力して「取得」を押してください</div>
      </div>
    </div>

    <!-- サイドバー開閉ボタン（モバイル） -->
    <button class="sb-toggle-btn" id="sbToggle" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- DETAIL DRAWER -->
    <div class="drawer" id="drawer">
      <span class="dd-close" onclick="closeDrawer()">✕</span>
      <span class="dd-tag" id="ddTag"></span>
      <div class="dd-title" id="ddTitle"></div>
      <div class="dd-metas">
        <div class="dd-meta">場所 <span id="ddLoc"></span></div>
        <div class="dd-meta">日時 <span id="ddDate"></span></div>
        <div class="dd-meta">カテゴリ <span id="ddCat"></span></div>
      </div>
      <div class="dd-body" id="ddBody"></div>
      <div class="dd-rel-label">関連項目</div>
      <div class="dd-rel-row" id="ddRel"></div>
    </div>

    <!-- TIMELINE -->
    <div class="tl-ctrl">
      <div class="tl-labels"><span>2020年</span><span>2022</span><span>2024</span><span>2025年</span></div>
      <input type="range" class="tl-slider" id="tl" min="2020" max="2025" value="2025" step="1">
      <div class="tl-year" id="tlYear">2025年</div>
    </div>
  </div>
</div>

<script>
// ★ RailwayのパブリックURLに変更してください
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:3001'
  : 'https://akashic-library-production.up.railway.app';

const TOPICS = [
  '世界の最新ニュース','気候変動','AI・テクノロジー',
  '中東情勢','宇宙開発','経済・金融','自然災害','日本のニュース'
];

const CAT_COLORS = {
  '紛争':'#E24B4A','技術':'#378ADD','環境':'#639922',
  '経済':'#EF9F27','社会':'#7F77DD','文化':'#D85A30','科学':'#1D9E75','その他':'#888780'
};

// ── MAP INIT ──────────────────────────────────────────────
const map = L.map('map', { zoomControl:false, center:[20,10], zoom:2 });
L.control.zoom({ position:'bottomleft' }).addTo(map);
const LAYERS = {
  street:    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:18}),
  dark:      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CARTO',maxZoom:19})
};
LAYERS.street.addTo(map);
let curLayer = 'street';
function setLayer(n) {
  map.removeLayer(LAYERS[curLayer]); LAYERS[n].addTo(map); curLayer = n;
  document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('btn' + n[0].toUpperCase() + n.slice(1)).classList.add('on');
}

// ── STATE ─────────────────────────────────────────────────
let allNews = [], markers = [], curFilter = 'all';
const saved = new Set(JSON.parse(localStorage.getItem('geosite_saved') || '[]'));

// ── TOPIC CHIPS ───────────────────────────────────────────
function initTopicChips() {
  const wrap = document.getElementById('topicChips');
  TOPICS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 't-chip';
    btn.textContent = t;
    btn.onclick = () => {
      document.querySelectorAll('.t-chip').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById('topicInput').value = t;
      loadNews();
    };
    wrap.appendChild(btn);
  });
}

// ── STATUS ─────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('dot').className = 'dot' + (state ? ' '+state : '');
  document.getElementById('statusText').textContent = text;
}

// ── SIDEBAR MOBILE ─────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── TIMELINE ──────────────────────────────────────────────
document.getElementById('tl').addEventListener('input', function() {
  document.getElementById('tlYear').textContent = this.value + '年';
  renderCards(); refreshMarkers();
});

// ── MARKERS ───────────────────────────────────────────────
function clearMarkers() { markers.forEach(m => map.removeLayer(m)); markers = []; }

function addMarker(n) {
  const color = CAT_COLORS[n.category] || CAT_COLORS['その他'];
  const icon = L.divIcon({
    className: '',
    html: `<div style="position:relative;width:22px;height:22px;cursor:pointer;">
      <div style="position:absolute;inset:0;border-radius:50%;background:${color};opacity:.22;"></div>
      <div style="position:absolute;inset:5px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,.9);box-shadow:0 0 6px ${color}66;"></div>
    </div>`,
    iconSize:[22,22], iconAnchor:[11,11], popupAnchor:[0,-14]
  });
  const m = L.marker([n.lat, n.lng], { icon });
  m.bindPopup(`
    <span class="pu-tag" style="background:${color}22;color:${color}">${n.category}</span>
    <div class="pu-title">${n.title}</div>
    <div class="pu-loc">📍 ${n.location} · ${n.date||''}</div>
    <button class="pu-btn" onclick="openById('${n.id}')">詳細を見る</button>`, { maxWidth:240 });
  m.on('click', () => openById(n.id));
  m.addTo(map); markers.push(m);
}

function refreshMarkers() {
  clearMarkers();
  const yr = parseInt(document.getElementById('tl').value);
  allNews
    .filter(n => (curFilter==='all'||n.category===curFilter) && (n.year||2025) <= yr)
    .forEach(addMarker);
}

// ── DRAWER ────────────────────────────────────────────────
function openById(id) {
  const n = allNews.find(x => x.id === id); if (!n) return;
  const color = CAT_COLORS[n.category] || CAT_COLORS['その他'];

  document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.news-card[data-id="${id}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ block:'nearest', behavior:'smooth' }); }

  const tag = document.getElementById('ddTag');
  tag.textContent = n.category;
  tag.style.cssText = `display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:4px;margin-bottom:6px;background:${color}22;color:${color};`;
  document.getElementById('ddTitle').textContent = n.title;
  document.getElementById('ddLoc').textContent   = n.location;
  document.getElementById('ddDate').textContent  = n.date || (n.year||'')+'年';
  document.getElementById('ddCat').textContent   = n.category;
  document.getElementById('ddBody').textContent  = n.summary || '';

  const rel = document.getElementById('ddRel'); rel.innerHTML = '';
  (n.related||[]).forEach(r => {
    const s = document.createElement('span');
    s.className = 'dd-rel-chip'; s.textContent = r;
    s.onclick = () => {
      document.getElementById('topicInput').value = r;
      document.querySelectorAll('.t-chip').forEach(b => b.classList.remove('on'));
      loadNews();
    };
    rel.appendChild(s);
  });

  document.getElementById('drawer').classList.add('show');
  map.setView([n.lat, n.lng], Math.max(map.getZoom(), 4), { animate:true });

  // モバイルではサイドバーを閉じてドロワーを見せる
  if (window.innerWidth <= 680) closeSidebar();
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('show');
  document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
}

// ── SAVE（マイリスト）─────────────────────────────────────
function toggleSave(id, btn) {
  if (saved.has(id)) {
    saved.delete(id);
    btn.textContent = '保存';
    btn.classList.remove('saved');
  } else {
    saved.add(id);
    btn.textContent = '済';
    btn.classList.add('saved');
  }
  localStorage.setItem('geosite_saved', JSON.stringify([...saved]));
}

// ── FILTER ────────────────────────────────────────────────
function setFilter(btn, cat) {
  curFilter = cat;
  document.querySelectorAll('.f-chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCards(); refreshMarkers(); closeDrawer();
}

// ── RENDER CARDS ──────────────────────────────────────────
function renderCards() {
  const yr = parseInt(document.getElementById('tl').value);
  const list = allNews.filter(n =>
    (curFilter==='all'||n.category===curFilter) && (n.year||2025) <= yr
  );
  const scroll = document.getElementById('cardScroll');
  if (!list.length) {
    scroll.innerHTML = `<div class="empty-state">該当するニュースがありません</div>`;
    return;
  }
  scroll.innerHTML = list.map(n => {
    const color = CAT_COLORS[n.category] || CAT_COLORS['その他'];
    const isSaved = saved.has(n.id);
    return `<div class="news-card" data-id="${n.id}" onclick="openById('${n.id}')">
      <div class="nc-header">
        <span class="nc-tag" style="background:${color}1a;color:${color}">${n.category}</span>
        <div class="nc-actions">
          <button class="nc-save-btn${isSaved?' saved':''}"
            onclick="event.stopPropagation();toggleSave('${n.id}',this)">
            ${isSaved ? '済' : '保存'}
          </button>
        </div>
      </div>
      <div class="nc-title">${n.title}</div>
      <div class="nc-meta">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        ${n.location} · ${n.date||n.year||''}
      </div>
      <div class="nc-chips">
        ${(n.related||[]).slice(0,3).map(r=>`<span class="nc-chip">${r}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── LOAD NEWS ─────────────────────────────────────────────
async function loadNews() {
  const btn = document.getElementById('fetchBtn');
  const topic = document.getElementById('topicInput').value.trim() || '世界の最新ニュース';
  btn.disabled = true; closeDrawer();
  setStatus('loading', '取得中...');
  try {
    const res = await fetch(`${API_BASE}/api/news?topic=${encodeURIComponent(topic)}`);
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'サーバーエラー'); }
    const { news, source, age_min } = await res.json();
    allNews = news.map((n, i) => ({ ...n, id: 'n'+i }));
    document.getElementById('badge').textContent = allNews.length + '件';
    renderCards(); refreshMarkers();
    if (allNews.length) {
      const lats = allNews.map(n=>n.lat), lngs = allNews.map(n=>n.lng);
      map.fitBounds([
        [Math.min(...lats)-5, Math.min(...lngs)-5],
        [Math.max(...lats)+5, Math.max(...lngs)+5]
      ]);
    }
    const note = source==='cache' ? `（キャッシュ ${age_min}分前）` : '';
    setStatus('ok', `${allNews.length}件 ${note}`);
  } catch(e) {
    setStatus('err', e.message);
    document.getElementById('cardScroll').innerHTML =
      `<div class="empty-state" style="color:rgba(226,75,74,0.8)">${e.message}</div>`;
  }
  btn.disabled = false;
}

// ── INIT ──────────────────────────────────────────────────
initTopicChips();
</script>
